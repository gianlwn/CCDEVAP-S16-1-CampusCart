<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart – Password Recovery</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.78 5.5 5.5 0 0 1 7.777-7.778z"></path><path d="M12 11.5l5 5.5 4-4-5.5-5M20 7l-2 2"></path></svg>
        </div>
        <p class="auth-title">Password Recovery</p>
      </div>

      <div id="recovery-verify-zone">
        <div class="form-group">
          <label class="form-label">School Email</label>
          <input type="email" class="form-input" id="rec-email" placeholder="account@university.edu.ph">
        </div>

        <button class="auth-btn" id="btn-rec-send" onclick="handleSendRecoveryCode()" style="background:var(--accent); margin-bottom:16px;">
          SEND RECOVERY CODE
        </button>

        <div class="form-group">
          <label class="form-label">Verification Code</label>
          <input type="text" class="form-input" id="rec-code" placeholder="••••••" maxlength="6">
        </div>

        <button class="auth-btn" onclick="handleConfirmRecoveryCode()">VERIFY IDENTITY</button>
      </div>

      <div id="recovery-password-zone" style="display: none;">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" id="rec-pw" class="form-input" placeholder="••••••••">
        </div>

        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input type="password" id="rec-pw2" class="form-input" placeholder="••••••••">
        </div>

        <button class="auth-btn" onclick="handlePasswordResetSubmit()">UPDATE PASSWORD</button>
      </div>

      <div class="auth-footer">
        <button class="auth-link" onclick="window.location.href='../login-path/login.html'">
          back to login
        </button>
      </div>

    </div>
  </div>

  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script>
    let recCodeSent = false;

    function handleSendRecoveryCode() {
      const email = document.getElementById('rec-email').value.trim();
      if (!email || !email.toLowerCase().endsWith('.edu.ph')) {
        showToast('Invalid Email', 'Please enter a valid .edu.ph address.', 'error');
        return;
      }
      recCodeSent = true;
      showToast('Code Sent', 'Your verification code is: 123456', 'success');
    }

    function handleConfirmRecoveryCode() {
      const code = document.getElementById('rec-code').value.trim();
      if (!recCodeSent) {
        showToast('Send Code First', 'Please request a recovery code first.', 'warning');
        return;
      }
      if (code !== '123456') {
        showToast('Invalid Code', 'The code you entered is incorrect.', 'error');
        return;
      }

      document.getElementById('recovery-verify-zone').style.display = 'none';
      document.getElementById('recovery-password-zone').style.display = 'block';
      showToast('Identity Verified', 'Please set your new account password.', 'success');
    }

    function handlePasswordResetSubmit() {
      const pw = document.getElementById('rec-pw').value;
      const pw2 = document.getElementById('rec-pw2').value;

      if (!pw || pw.length < 4) {
        showToast('Weak Password', 'Please enter a valid password.', 'warning');
        return;
      }
      if (pw !== pw2) {
        showToast('Mismatch', 'Passwords do not match.', 'error');
        return;
      }

      showToast('Password Updated', 'Your password has been changed. Redirecting to login...', 'success', 1500);
      setTimeout(() => {
        window.location.href = '../login-path/login.html';
      }, 1200);
    }
  </script>
</body>
</html>
