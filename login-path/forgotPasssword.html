<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/all.min.css" />
  <link rel="stylesheet" href="../css/admin-style.css" />
  <link rel="stylesheet" href="../css/login-style.css" />
  <title>CampusCart | Reset Password</title>
</head>
<body class="auth-viewport-center">

  <div class="auth-card-panel">
    <div class="auth-card-header">
      <div class="auth-brand-logo-container">
        <div class="brand-logo-circle">
          <i class="fa-solid fa-graduation-cap"></i>
        </div>
      </div>
      <h1 class="brand-header-banner">PASSWORD RECOVERY</h1>
    </div>

    <div id="error-alert" class="alert-banner alert-error"></div>
    <div id="success-alert" class="alert-banner alert-success"></div>

    <div class="auth-form-container">
      
      <div id="verification-stage">
        <div class="input-group">
          <label for="resetEmail">Educational Email Address</label>
          <input type="email" id="resetEmail" class="auth-pill-input" placeholder="username@university.edu.ph" pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.edu\.ph$" required />
        </div>

        <button type="button" id="sendCodeBtn" class="auth-pill-dispatch-code-btn" onclick="dispatchRecoveryToken()">SEND VERIFICATION CODE</button>
        
        <div id="timerDisplay" class="form-static-notice-pill" style="display: none; background-color: #bc9e82;">Token lifecycle active</div>

        <div class="input-group">
          <label for="recoveryCode">Verification Code</label>
          <input type="text" id="recoveryCode" class="auth-pill-input" placeholder="Enter verification code" />
        </div>

        <button type="button" class="auth-pill-confirm-btn" onclick="verifyRecoveryToken()">CONFIRM</button>
      </div>

      <form id="password-stage" style="display: none;" onsubmit="executePasswordReset(event)">
        <div class="input-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" class="auth-pill-input" placeholder="••••••••" required />
        </div>

        <div class="input-group">
          <label for="confirmNewPassword">Confirm New Password</label>
          <input type="password" id="confirmNewPassword" class="auth-pill-input" placeholder="••••••••" required />
        </div>

        <button type="submit" id="resetBtn" class="auth-pill-submit-btn">RESET PASSWORD</button>
      </form>

    </div>

    <div class="auth-outer-actions-bar">
      <a href="login.html" class="auth-register-capsule-link">Remembered? Back to Login</a>
    </div>

  </div>

  <script src="../js/toggletheme.js"></script>
  <script src="../js/auth-flows.js"></script>
</body>
</html>
