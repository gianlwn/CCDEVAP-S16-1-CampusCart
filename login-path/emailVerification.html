<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart – Email Verification</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
        <p class="auth-title">Verify Your Email</p>
      </div>

      <div class="form-group">
        <label class="form-label">School Email</label>
        <input type="email" class="form-input" id="vfy-email"
          placeholder="account@university.edu.ph" autocomplete="email">
      </div>

      <button class="auth-btn" id="btn-send" onclick="handleSendCode()"
        style="background:var(--accent);margin-bottom:16px;">
        SEND VERIFICATION CODE
      </button>

      <div class="form-group">
        <label class="form-label">Verification Code</label>
        <input type="text" class="form-input" id="vfy-code"
          placeholder="••••••" maxlength="6" autocomplete="one-time-code">
      </div>

      <button class="auth-btn" onclick="handleConfirm()">CONFIRM</button>

      <div class="auth-footer">
        <button class="auth-link" onclick="window.location.href='../login-path/login.html'">
          back to login
        </button>
      </div>

    </div>
  </div>

  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>

  <script>
    (function () {
      const saved = localStorage.getItem('campuscart-theme');
      if (saved === 'darkMode') document.body.classList.add('darkMode');
    })();

    let codeSent = false;

    function handleSendCode() {
      const email = document.getElementById('vfy-email').value.trim();

      if (!email) {
        showToast('Missing Email', 'Please enter your school email.', 'warning');
        return;
      }

      if (!email.toLowerCase().endsWith('.edu.ph')) {
        showToast('Invalid Email', 'Only valid .edu.ph addresses are accepted.', 'error');
        return;
      }

      const btn = document.getElementById('btn-send');
      btn.disabled = true;
      btn.textContent = 'Code Sent!';
      codeSent = true;

      showToast('Code Sent', 'Check your inbox! The code is: 123456', 'success', 5000);

      const codeInput = document.getElementById('vfy-code');
      if (codeInput) {
        codeInput.focus();
      }

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = 'RESEND CODE';
      }, 30000);
    }

    function handleConfirm() {
      const code = document.getElementById('vfy-code').value.trim();
      const email = document.getElementById('vfy-email').value.trim();

      if (!codeSent) {
        showToast('Send Code First', 'Please send a verification code before confirming.', 'warning');
        return;
      }

      if (code !== '123456') {
        showToast('Incorrect Code', 'The verification token you entered is incorrect. Please try again.', 'error');
        return;
      }

      localStorage.setItem('verified-signup-email', email);

      showToast('Verified!', 'Email confirmed. Redirecting…', 'success', 1500);
      setTimeout(() => {
        window.location.href = '../login-path/register.html';
      }, 1200);
    }
  </script>
</body>
</html>
