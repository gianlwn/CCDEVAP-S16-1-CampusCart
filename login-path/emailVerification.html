<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | Email Verification</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/toast.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

  <div class="auth-page">

    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg></div>
        <p class="auth-title">Verify Your Email</p>
      </div>

      <div class="form-group">
        <label class="form-label">School Email</label>
        <input type="email" class="form-input" id="vfy-email" placeholder="account@university.edu.ph"
          autocomplete="email">
      </div>

      <button type="button" class="auth-btn" id="btn-send" onclick="handleSendCode()"
        style="background:var(--accent);margin-bottom:16px;">SEND VERIFICATION CODE</button>

      <div class="form-group">
        <label class="form-label">Verification Code</label>
        <input type="text" class="form-input" id="vfy-code" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢" maxlength="6"
          autocomplete="one-time-code">
      </div>

      <button class="auth-btn" onclick="handleConfirm()">CONFIRM</button>

      <div class="auth-footer">
        <button class="auth-link" onclick="window.location.href='../login-path/login.html'">back to login</button>
      </div>

    </div>
  </div>

  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/login.js"></script>

</body>

</html>
