<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | Password Recovery</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/toast.css">
  <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

  <div class="auth-page">

    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.78 5.5 5.5 0 0 1 7.777-7.778z"></path>
            <path d="M12 11.5l5 5.5 4-4-5.5-5M20 7l-2 2"></path>
          </svg>
        </div>
        <h1 class="auth-brand-name">CampusCart</h1>
        <p class="auth-title">Password Recovery</p>
      </div>

      <div id="recovery-verify-zone">
        <div class="form-group">
          <label class="form-label">School Email</label>
          <input type="email" class="form-input" id="rec-email" placeholder="account@university.edu.ph" required>
        </div>

        <button class="auth-btn" id="btn-rec-send" onclick="handleSendRecoveryCode()"
          style="background:var(--accent); margin-bottom:16px;">SEND RECOVERY CODE</button>

        <div class="form-group">
          <label class="form-label">Verification Code</label>
          <input type="text" class="form-input" id="rec-code" placeholder="••••••" maxlength="6" required>
        </div>

        <button class="auth-btn" onclick="handleConfirmRecoveryCode()">VERIFY IDENTITY</button>
      </div>

      <div id="recovery-password-zone" style="display: none;">
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-eye-wrap">
            <input type="password" id="rec-pw" class="form-input" placeholder="••••••••" required>
            <button type="button" class="btn-eye" onclick="togglePw('rec-pw',this)" tabindex="-1"
              title="Show/hide password">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <div class="input-eye-wrap">
            <input type="password" id="rec-pw2" class="form-input" placeholder="••••••••" required>
            <button type="button" class="btn-eye" onclick="togglePw('rec-pw2',this)" tabindex="-1"
              title="Show/hide password">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button class="auth-btn" onclick="handlePasswordResetSubmit()">UPDATE PASSWORD</button>
      </div>

      <div class="auth-footer">
        <button class="auth-link" onclick="window.location.href='../login-path/login.html'">
          back to login
        </button>
      </div>

    </div>
  </div>

  <script src="../../backend/auth.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/login.js"></script>

</body>

</html>
