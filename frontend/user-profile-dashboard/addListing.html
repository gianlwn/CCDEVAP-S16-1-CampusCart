<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | Add Listing</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/side-bottom-nav.css">
  <link rel="stylesheet" href="../css/toast.css">
  <link rel="stylesheet" href="../css/listings.css">
</head>

<body>

  <div id="top-nav"></div>

  <div class="page-wrapper">

    <div id="side-nav"></div>

    <main class="main-content">

      <div class="listings-page-header">
        <h1 class="page-title" style="margin-bottom:0;">Add New Listing</h1>
        <a href="../user-profile-dashboard/userListings.html" class="btn-back-listings">
          &#8592; Back to Listings
        </a>
      </div>

      <div class="add-listing-split">

        <div class="add-listing-preview-col">
          <p class="section-title">Live Preview</p>
          <div class="preview-card" id="preview-card">
            <div class="preview-img-zone" id="preview-img">
              <div class="preview-img-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="16.5" y1="9.4" x2="7.5" y2="4.21" />
                  <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                  <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                  <line x1="12" y1="22.08" x2="12" y2="12" />
                </svg>
              </div>
            </div>
            <div class="preview-body">
              <div class="preview-name" id="preview-name">Item Name</div>
              <div class="preview-price" id="preview-price">₱ –</div>
              <div class="preview-tags">
                <span class="preview-tag" id="preview-category">Category</span>
                <span class="preview-tag" id="preview-category-2"></span>
                <span class="preview-tag" id="preview-category-3"></span>
                <span class="preview-tag cond" id="preview-condition"></span>
              </div>
              <span class="preview-status-badge">Pending Review</span>
            </div>
          </div>
          <div class="img-thumbs" id="img-thumbs" style="margin-top:12px;"></div>
        </div>

        <div class="add-listing-form-col">
          <div class="form-group">
            <label class="form-label">Item Name</label>
            <input type="text" class="form-input" id="inp-name" placeholder="e.g. Casio FX-991EX">
          </div>

          <div class="form-group">
            <label class="form-label">
              Description
              <span class="char-counter" id="desc-counter">0 / 500</span>
            </label>
            <textarea class="form-textarea" id="inp-desc" maxlength="500"
              placeholder="Describe your item — condition, reason for selling, accessories included…"
              rows="5"></textarea>
          </div>

          <div class="form-row-two">
            <div class="form-group">
              <label class="form-label">Price</label>
              <div class="input-prefix-wrap">
                <span class="input-prefix">₱</span>
                <input type="number" class="form-input with-prefix" id="inp-price" placeholder="0.00" min="0" step="0.01">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Quantity</label>
              <input type="number" class="form-input" id="inp-qty" value="1" min="1">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Primary Category</label>
            <select class="form-select" id="inp-category">
              <option value="">Select…</option>
            </select>
          </div>

          <div class="form-row-two">
            <div class="form-group">
              <label class="form-label">Secondary Category</label>
              <select class="form-select" id="inp-category-2">
                <option value="">None</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Tertiary Category</label>
              <select class="form-select" id="inp-category-3">
                <option value="">None</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Condition</label>
            <select class="form-select" id="inp-condition">
              <option value="">Select…</option>
              <option>New</option>
              <option>Good</option>
              <option>Used</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Pickup Location</label>
            <input type="text" class="form-input" id="inp-location" placeholder="e.g. Manila, Quezon City">
          </div>

          <div class="form-group">
            <label class="form-label">Images <span style="text-transform:none;letter-spacing:0;font-weight:500;opacity:.75;">(at least 1, max 5)</span></label>
            <div class="img-upload-area" id="img-upload-area"
              onclick="document.getElementById('img-file-input').click()">
              <div class="img-upload-inner">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                  <circle cx="8.5" cy="8.5" r="1.5" />
                  <polyline points="21 15 16 10 5 21" />
                </svg>
                <span>Click to upload photos</span>
              </div>
            </div>
            <input type="file" id="img-file-input" accept="image/*" multiple style="display:none">
          </div>

          <div class="listing-form-footer">
            <button class="btn-add-listing" onclick="handleAddListing()">Submit Listing</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../../backend/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/addListing.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetchCategories().then(categories => {
        const names = categories.map(c => c.category_name);
        const primary = document.getElementById('inp-category');
        const secondary = document.getElementById('inp-category-2');
        const tertiary = document.getElementById('inp-category-3');
        names.forEach(name => {
          primary.insertAdjacentHTML('beforeend', `<option>${name}</option>`);
          secondary.insertAdjacentHTML('beforeend', `<option>${name}</option>`);
          tertiary.insertAdjacentHTML('beforeend', `<option>${name}</option>`);
        });
      }).catch(() => {
        showToast('Error', 'Could not load categories.', 'error');
      });
    });
  </script>

</body>

</html>
