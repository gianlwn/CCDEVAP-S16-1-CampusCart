<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | Profile</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/side-bottom-nav.css">
  <link rel="stylesheet" href="../css/toast.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>

<body>

  <div id="top-nav"></div>

  <div class="page-wrapper">

    <div id="side-nav"></div>

    <main class="main-content">
      <h1 class="page-title">Profile</h1>

      <div class="profile-page-layout">

        <div class="profile-summary-card">

          <div class="profile-avatar-wrap">
            <div class="profile-avatar">
              <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </div>
            <button class="btn-edit-img" onclick="handleEditImage()">
              <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
              Edit Photo
            </button>
          </div>

          <div class="profile-display-name" id="summary-name">—</div>

          <span class="verified-badge" id="verified-badge">✓ Verified</span>

          <div class="profile-rating-row">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"
              stroke="none">
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
            <span id="summary-rating-val">—</span>
          </div>

          <div class="profile-stats-table">
            <div class="profile-stat-row">
              <span>Items Sold</span>
              <strong id="stat-items-sold">—</strong>
            </div>
            <div class="profile-stat-row">
              <span>Active Listings</span>
              <strong id="stat-active-listings">—</strong>
            </div>
            <div class="profile-stat-row">
              <span>Member Since</span>
              <strong id="stat-member-since">—</strong>
            </div>
          </div>

        </div>

        <div class="profile-form-card">

          <div class="form-section">
            <div class="form-section-title">Personal Information</div>
            <div class="profile-form-grid">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="prof-name" value="" oninput="syncSummaryName(this.value)">
              </div>
              <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" id="prof-phone" placeholder="+63 000 000 0000" maxlength="13">
              </div>
              <div class="form-group full">
                <label class="form-label">Bio</label>
                <textarea class="form-input" id="prof-bio" rows="3" placeholder="Tell buyers a bit about yourself..."
                  style="resize:vertical;min-height:72px;font-family:inherit;"></textarea>
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Academic Information</div>
            <div class="profile-form-grid">
              <div class="form-group full">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="prof-email" value="" readonly>
              </div>
              <div class="form-group">
                <label class="form-label">School / University</label>
                <select class="form-select" id="prof-school">
                  <option>De La Salle University</option>
                  <option>University of Santo Tomas</option>
                  <option>Ateneo de Manila University</option>
                  <option>University of the Philippines</option>
                  <option>Mapua University</option>
                  <option>Other</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Course Code</label>
                <input type="text" class="form-input" id="prof-course" placeholder="e.g. BSECE">
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Security</div>
            <div class="profile-form-grid">
              <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="pw-input-wrap">
                  <input type="password" class="form-input" id="prof-pw" placeholder="Leave blank to keep current">
                  <button type="button" class="btn-pw-toggle" onclick="togglePw('prof-pw', this)" tabindex="-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="pw-input-wrap">
                  <input type="password" class="form-input" id="prof-pw2" placeholder="Repeat new password">
                  <button type="button" class="btn-pw-toggle" onclick="togglePw('prof-pw2', this)" tabindex="-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="form-save-row">
            <button class="btn-outline" onclick="handleHelp()">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
              Help
            </button>
            <button class="btn-primary" onclick="handleSaveProfile()">Save Changes</button>
          </div>

        </div>
      </div>

      <div class="mobile-account-actions">
        <button class="admin-dash-btn" onclick="window.location.href='../admin-dashboard/adminDashboard.html'">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          Admin Dashboard
        </button>
        <button class="signout-btn" onclick="handleSignOut()">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sign Out
        </button>
      </div>

      <div class="danger-zone-card">
        <div class="danger-zone-text">
          <div class="danger-zone-desc">Permanently delete your account and all associated data. This action cannot be
            undone.</div>
        </div>
        <button class="btn-danger-outline" onclick="handleDeleteAccount()">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
          </svg>
          Delete Account
        </button>
      </div>

    </main>
  </div>

  <script src="../../backend/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/profile.js"></script>

</body>

</html>
