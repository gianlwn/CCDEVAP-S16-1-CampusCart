<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin-style.css" />
  <link rel="stylesheet" href="../css/admin-sidebar.css">
  <link rel="stylesheet" href="../css/admin-dashboard.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <title>CampusCart | Admin Dashboard</title>
</head>

<body>
  <div id="top-nav"></div>
  <div class="app-body" style="margin-top:var(--nav-height);height:calc(100vh - var(--nav-height));">
    <aside id="admin-side-nav"></aside>
    <div class="main-container">
      <div class="sub-header">
        <h2>Admin Panel</h2>
        <div class="login-status">
          Logged in as <strong>Administrator</strong>
        </div>
      </div>
      <main class="main-content">
        <div class="dashboard-grid-2x2">
          <div class="analytics-card">
            <h3>User Accounts Status</h3>
            <div class="chart-container">
              <canvas id="userStatusChart"></canvas>
            </div>
          </div>
          <div class="analytics-card">
            <h3>Submitted Reports Per Month</h3>
            <div class="chart-container">
              <canvas id="reportsMonthlyChart"></canvas>
            </div>
          </div>
          <div class="analytics-card">
            <h3>Popular Categories</h3>
            <div class="chart-container">
              <canvas id="popularCategoriesChart"></canvas>
            </div>
          </div>
          <div class="analytics-card">
            <h3>Listings Status Report</h3>
            <div class="chart-container">
              <canvas id="listingsStatusChart"></canvas>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/adminComponents.js"></script>
  <script>
    loadTopNav();
    storeTheme();
    loadAdminSideNav('adminDashboard.html');

    document.addEventListener('DOMContentLoaded', function () {
      var accent = '#8b6344';
      var grid   = 'rgba(139,99,68,0.14)';
      var text   = '#1c1412';
      if (document.body.classList.contains('darkMode')) {
        accent = '#d4b896'; grid = 'rgba(212,184,150,0.22)'; text = '#f5f0eb';
      }

      new Chart(document.getElementById('userStatusChart'), {
        type: 'doughnut',
        data: {
          labels: ['Active','Suspended','Banned'],
          datasets: [{ data: [678, 24, 8],
            backgroundColor: ['rgba(66,163,100,0.85)','rgba(72,130,210,0.85)','rgba(205,65,65,0.85)'],
            borderColor: 'transparent', borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '58%',
          plugins: { legend: { position: 'bottom', labels: { color: text, font: { size: 10 }, padding: 10 } } } }
      });

      new Chart(document.getElementById('reportsMonthlyChart'), {
        type: 'line',
        data: {
          labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
          datasets: [{ label: 'Reports', data: [12,18,9,24,31,28,19,22,15,30,26,20],
            borderColor: accent, backgroundColor: accent + '22', borderWidth: 2,
            tension: 0.4, fill: true, pointRadius: 3 }]
        },
        options: { responsive: true, maintainAspectRatio: false,
          scales: { x: { ticks: { color: text, font: { size: 10 } }, grid: { color: grid } },
                    y: { ticks: { color: text }, grid: { color: grid }, min: 0 } },
          plugins: { legend: { display: false } } }
      });

      new Chart(document.getElementById('popularCategoriesChart'), {
        type: 'bar',
        data: {
          labels: ['Electronics','Books','Lab Tools','Clothing','Others'],
          datasets: [{ label: 'Items', data: [80, 60, 55, 30, 20],
            backgroundColor: 'rgba(122,171,138,0.78)', borderColor: 'rgba(122,171,138,1)', borderWidth: 1, borderRadius: 4 }]
        },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          scales: { x: { ticks: { color: text }, grid: { color: grid } },
                    y: { ticks: { color: text }, grid: { color: grid } } },
          plugins: { legend: { display: false } } }
      });

      new Chart(document.getElementById('listingsStatusChart'), {
        type: 'bar',
        data: {
          labels: ['Approved','Pending','Rejected'],
          datasets: [{ label: 'Listings',
            data: [320, 45, 12],
            backgroundColor: ['rgba(66,163,100,0.85)','rgba(72,130,210,0.85)','rgba(205,65,65,0.85)'],
            borderRadius: 4 }]
        },
        options: { responsive: true, maintainAspectRatio: false,
          scales: { x: { ticks: { color: text }, grid: { color: grid } },
                    y: { ticks: { color: text }, grid: { color: grid }, min: 0 } },
          plugins: { legend: { display: false } } }
      });
    });
  </script>

</body>

</html>
