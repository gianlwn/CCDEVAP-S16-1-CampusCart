<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin-style.css" />
  <link rel="stylesheet" href="../css/admin-sidebar.css">
  <link rel="stylesheet" href="../css/admin-dashboard.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/toast.css">
  <title>CampusCart | Admin Dashboard</title>
</head>

<body>

  <div id="top-nav"></div>
  <div class="app-body" style="margin-top:var(--nav-height);height:calc(100vh - var(--nav-height));">

    <aside id="admin-side-nav"></aside>
    <div class="main-container">

      <div class="sub-header">
        <h2>Admin Panel</h2>
        <div class="login-status">
          Logged in as <strong>Administrator</strong>
        </div>
      </div>

      <main class="main-content">
        <div class="dashboard-grid-2x2">

          <div class="analytics-card">
            <h3>User Accounts Status</h3>
            <div class="chart-container">
              <canvas id="userStatusChart"></canvas>
            </div>
          </div>

          <div class="analytics-card">
            <h3>Submitted Reports Per Month</h3>
            <div class="chart-container">
              <canvas id="reportsMonthlyChart"></canvas>
            </div>
          </div>

          <div class="analytics-card">
            <h3>Popular Categories</h3>
            <div class="chart-container">
              <canvas id="popularCategoriesChart"></canvas>
            </div>
          </div>

          <div class="analytics-card">
            <h3>Listings Status Report</h3>
            <div class="chart-container">
              <canvas id="listingsStatusChart"></canvas>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/adminComponents.js"></script>
  <script>
    loadTopNav();
    storeTheme();
    loadAdminSideNav('adminDashboard.html');

    document.addEventListener('DOMContentLoaded', function () {
      var t = getChartTheme();

      new Chart(document.getElementById('userStatusChart'), {
        type: 'doughnut',
        data: {
          labels: ['Active', 'Suspended', 'Banned'],
          datasets: [{
            data: [678, 24, 8],
            backgroundColor: ['rgba(14,136,120,0.85)', 'rgba(72,130,210,0.82)', 'rgba(192,57,43,0.82)'],
            borderColor: t.cardBg, borderWidth: 3
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '60%',
          plugins: { legend: { position: 'bottom', labels: { color: t.text, font: { size: 11 }, padding: 12 } } }
        }
      });

      new Chart(document.getElementById('reportsMonthlyChart'), {
        type: 'line',
        data: {
          labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
          datasets: [{
            label: 'Reports', data: [12, 18, 9, 24, 31, 28, 19, 22, 15, 30, 26, 20],
            borderColor: t.accent, backgroundColor: t.barBg, borderWidth: 2,
            tension: 0.4, fill: true, pointRadius: 3
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            x: { ticks: { color: t.text, font: { size: 11 } }, grid: { color: t.grid } },
            y: { ticks: { color: t.text }, grid: { color: t.grid }, min: 0 }
          },
          plugins: { legend: { display: false } }
        }
      });

      new Chart(document.getElementById('popularCategoriesChart'), {
        type: 'bar',
        data: {
          labels: ['Electronics', 'Books', 'Lab Tools', 'Clothing', 'Others'],
          datasets: [{
            label: 'Items', data: [80, 60, 55, 30, 20],
            backgroundColor: t.barBg, borderColor: t.accent, borderWidth: 1, borderRadius: 5
          }]
        },
        options: {
          indexAxis: 'y', responsive: true, maintainAspectRatio: false,
          scales: {
            x: { ticks: { color: t.text }, grid: { color: t.grid } },
            y: { ticks: { color: t.text }, grid: { color: t.grid } }
          },
          plugins: { legend: { display: false } }
        }
      });

      new Chart(document.getElementById('listingsStatusChart'), {
        type: 'bar',
        data: {
          labels: ['Approved', 'Pending', 'Rejected'],
          datasets: [{
            label: 'Listings',
            data: [320, 45, 12],
            backgroundColor: ['rgba(14,136,120,0.82)', 'rgba(201,138,46,0.82)', 'rgba(192,57,43,0.82)'],
            borderRadius: 5
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: {
            x: { ticks: { color: t.text }, grid: { color: t.grid } },
            y: { ticks: { color: t.text }, grid: { color: t.grid }, min: 0 }
          },
          plugins: { legend: { display: false } }
        }
      });
    });
  </script>

</body>

</html>
