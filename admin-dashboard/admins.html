<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/admin-style.css" />
    <link rel="stylesheet" href="../css/admin-sidebar.css">
    <link rel="stylesheet" href="../css/admin-admins.css">
    <link rel="stylesheet" href="../css/top-nav.css">
    <link rel="stylesheet" href="../css/toast.css">
    <title>CampusCart | Admins</title>
</head>

<body>
    
    <div id="top-nav"></div>
    <div class="app-body" style="margin-top:var(--nav-height);height:calc(100vh - var(--nav-height));">
        
        <aside id="admin-side-nav"></aside>
        <div class="main-container">
            
            <div class="sub-header">
                <h2>Admin Panel</h2>
                <div class="login-status">
                    Logged in as <strong>Administrator</strong>
                </div>
            </div>
            
            <main class="main-content">
                
                <div class="page-toolbar">
                    <div class="toolbar-left-panel">
                        <h3>Administrators</h3>
                        <span class="admins-counter-text">Current Admins: 5</span>
                    </div>
                    <div class="toolbar-right-panel">
                        <button class="add-admin-action-btn">
                            <i class="fa-solid fa-plus"></i> Add Administrator
                        </button>
                        <div class="search-capsule-box">
                            <input type="text" placeholder="Search....." class="search-input-field">
                            <button class="search-glass-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                        </div>
                    </div>
                </div>
                
                <div id="admins-stack-list"></div>
            </main>
        </div>
    </div>

    
    <script src="../js/components.js"></script>
    <script src="../js/toggleTheme.js"></script>
    <script src="../js/toastNotification.js"></script>
    <script src="../js/adminComponents.js"></script>
    <script>
        loadTopNav();
        storeTheme();
        loadAdminSideNav('admins.html');
        displayAdmins();
    </script>
</body>

</html>
