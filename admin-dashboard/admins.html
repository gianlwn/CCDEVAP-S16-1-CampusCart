<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/admin-style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.min.js"
        integrity="sha512-n/G+dROKbKL3GVngGWmWfwK0yPctjZQM752diVYnXZtD/48agpUKLIn0xDQL9ydZ91x6BiOmTIFwWjjFi2kEFg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <title>CampusCart | Admins</title>
</head>

<body>
    <div id="top-nav-container"></div>
    <div class="app-body">
        <aside id="admin-side-nav"></aside>
        <div class="main-container">
            <div class="sub-header">
                <h2>Admin Panel</h2>
                <div class="login-status">
                    Logged in as <strong>Administrator</strong>
                </div>
            </div>
            <main class="main-content">
                <div class="admins-toolbar">
                    <div class="toolbar-left-panel">
                        <h3>Administrators</h3>
                        <span class="admins-counter-text">Current Admins: 12</span>
                    </div>

                    <div class="toolbar-right-panel">
                        <button class="add-admin-action-btn">
                            <i class="fa-solid fa-plus"></i> Add Administrator
                        </button>
                        <div class="search-capsule-box">
                            <input type="text" placeholder="Search....." class="search-input-field">
                            <button class="search-glass-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                        </div>
                    </div>
                </div>
                <div class="admins-stack-list">
                    <div class="admin-identity-row-card">
                        <div class="avatar-wireframe-box"></div>
                        <div class="admin-text-details">
                            <span class="admin-display-name">Username</span>
                            <span class="admin-display-email">email.com</span>
                        </div>
                        <div class="admin-status-badge-zone">
                            <span class="badge-pill pill-status-active">Active</span>
                        </div>
                        <div class="admin-actions-button-group">
                            <button class="action-trigger edit-trigger-btn">
                                <i class="fa-solid fa-pen-to-square"></i> Edit
                            </button>
                            <div class="button-inner-divider"></div>
                            <button class="action-trigger revoke-trigger-btn">
                                <i class="fa-solid fa-user-slash"></i> Revoke
                            </button>
                        </div>
                    </div>
                    <div class="admin-identity-row-card">
                        <div class="avatar-wireframe-box"></div>
                        <div class="admin-text-details">
                            <span class="admin-display-name">Username</span>
                            <span class="admin-display-email">email.com</span>
                        </div>
                        <div class="admin-status-badge-zone">
                            <span class="badge-pill pill-status-inactive">Inactive</span>
                        </div>
                        <div class="admin-actions-button-group">
                            <button class="action-trigger edit-trigger-btn">
                                <i class="fa-solid fa-pen-to-square"></i> Edit
                            </button>
                            <div class="button-inner-divider"></div>
                            <button class="action-trigger revoke-trigger-btn">
                                <i class="fa-solid fa-user-slash"></i> Revoke
                            </button>
                        </div>
                    </div>
                    <div class="admin-identity-row-card">
                        <div class="avatar-wireframe-box"></div>
                        <div class="admin-text-details">
                            <span class="admin-display-name">Username</span>
                            <span class="admin-display-email">email.com</span>
                        </div>
                        <div class="admin-status-badge-zone">
                            <span class="badge-pill pill-status-active">Active</span>
                        </div>
                        <div class="admin-actions-button-group">
                            <button class="action-trigger edit-trigger-btn">
                                <i class="fa-solid fa-pen-to-square"></i> Edit
                            </button>
                            <div class="button-inner-divider"></div>
                            <button class="action-trigger revoke-trigger-btn">
                                <i class="fa-solid fa-user-slash"></i> Revoke
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="../js/components.js"></script>
    <script>
        loadTopNav();
        loadAdminSideNav('admins.html');
    </script>
</body>

</html>
