<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | Overview</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/side-bottom-nav.css">
  <link rel="stylesheet" href="../css/toast.css">
  <link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

  <div id="top-nav"></div>

  <div class="page-wrapper">

    <div id="side-nav"></div>

    <main class="main-content">
      <h1 class="page-title">Overview</h1>

      <div class="kpi-grid">

        <div class="kpi-card kpi-teal">
          <div class="kpi-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
              <line x1="7" y1="7" x2="7.01" y2="7" />
            </svg>
          </div>
          <div>
            <div class="kpi-value" id="kpi-total-listings">â€“</div>
            <div class="kpi-label">Total Listings</div>
          </div>
        </div>

        <div class="kpi-card kpi-coral">
          <div class="kpi-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
          </div>
          <div>
            <div class="kpi-value" id="kpi-items-sold">â€“</div>
            <div class="kpi-label">Items Sold</div>
          </div>
        </div>

        <div class="kpi-card kpi-gold">
          <div class="kpi-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="1" x2="12" y2="23" />
              <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
            </svg>
          </div>
          <div>
            <div class="kpi-value" id="kpi-earnings">â€“</div>
            <div class="kpi-label">Total Earnings</div>
          </div>
        </div>

        <div class="kpi-card kpi-teal">
          <div class="kpi-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"
              stroke="none">
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
          </div>
          <div>
            <div class="kpi-value" id="kpi-avg-rating">â€“</div>
            <div class="kpi-label">Avg Rating</div>
          </div>
        </div>

        <div class="kpi-card kpi-coral">
          <div class="kpi-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
          </div>
          <div>
            <div class="kpi-value" id="kpi-open-reports">â€“</div>
            <div class="kpi-label">Open Reports</div>
          </div>
        </div>

      </div>

      <div class="charts-grid">

        <div class="chart-card">
          <h3>Overall Seller Rating</h3>
          <div class="chart-container">
            <canvas id="chart-seller-rating"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>Items Bought per Category</h3>
          <div class="chart-container">
            <canvas id="chart-categories"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>Reports on Listing</h3>
          <div class="donut-wrap" style="justify-content:center;">
            <div style="position:relative;width:160px;height:160px;flex-shrink:0;">
              <canvas id="chart-reports"></canvas>
            </div>
            <div class="legend-items" id="reports-legend"></div>
          </div>
        </div>

        <div class="chart-card">
          <h3>Items Sold Per Month</h3>
          <div class="chart-container">
            <canvas id="chart-sold"></canvas>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/dashboard.js"></script>

</body>

</html>
