<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | Overview</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

  <div id="top-nav-container"></div>

  <div class="page-wrapper">
    <div id="side-nav"></div>

    <main class="main-content">
      <h1>Overview</h1>

      <div class="stat-boxes">
        <div class="stat-box">
          <p class="stat-number">4</p>
          <p class="stat-label">Active Listings</p>
        </div>
        <div class="stat-box">
          <p class="stat-number">7</p>
          <p class="stat-label">Claimed Items</p>
        </div>
        <div class="stat-box">
          <p class="stat-number">4.2 ★</p>
          <p class="stat-label">Ratings</p>
        </div>
        <div class="stat-box">
          <p class="stat-number">234</p>
          <p class="stat-label">Liked</p>
        </div>
      </div>

      <h2>Overall Seller Rating</h2>
      <div class="chart-container" id="seller-rating-chart"></div>

      <h2>Items Bought per Category</h2>
      <div class="chart-container" id="category-chart"></div>

      <h2>Reports on Listing</h2>
      <div class="chart-container" id="reports-chart"></div>
    </main>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
