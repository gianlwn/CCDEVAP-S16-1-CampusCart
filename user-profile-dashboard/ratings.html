<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | Ratings</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/side-bottom-nav.css">
  <link rel="stylesheet" href="../css/toast.css">

</head>

<body>

  <div id="top-nav"></div>

  <div class="page-wrapper">

    <div id="side-nav"></div>

    <main class="main-content">
      <h1 class="page-title">Ratings</h1>

      <div class="content-grid">

        <div>
          <p class="section-title">Reviews You've Given</p>
          <div class="item-list" id="ratings-list">
            <p style="color:var(--text-muted);padding:16px 0;">Loadingâ€¦</p>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:16px;">

          <div class="side-panel-card">
            <h3>Average Rating Given</h3>
            <div class="avg-rating" id="avg-rating-display">
              <div class="big-number">â€“</div>
            </div>
          </div>

          <div class="side-panel-card">
            <h3>Rating Distribution</h3>
            <div class="chart-container-sm">
              <canvas id="chart-dist"></canvas>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <div id="edit-modal" style="
    display:none; position:fixed; inset:0; z-index:500;
    background:rgba(0,0,0,0.45); align-items:center; justify-content:center;
  ">
    <div style="
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:var(--radius); padding:28px 24px;
      width:min(360px, calc(100vw - 28px));
      box-shadow:var(--shadow-card); transition: background-color var(--transition);
    ">
      <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text);">Edit Rating</h2>

      <p
        style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">
        Your Rating
      </p>
      <div id="modal-star-picker" style="display:flex;gap:6px;margin-bottom:14px;font-size:28px;cursor:pointer;">
        <span class="modal-star" data-val="1">â˜…</span>
        <span class="modal-star" data-val="2">â˜…</span>
        <span class="modal-star" data-val="3">â˜…</span>
        <span class="modal-star" data-val="4">â˜…</span>
        <span class="modal-star" data-val="5">â˜…</span>
      </div>

      <p
        style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">
        Review
      </p>
      <textarea id="modal-review" rows="3" style="
        width:100%; padding:9px 11px; border:1px solid var(--border);
        border-radius:var(--radius-xs); background:var(--bg); color:var(--text);
        font-size:13px; resize:none; outline:none; transition:all var(--transition);
        font-family:inherit;
      "></textarea>

      <div style="display:flex;gap:10px;margin-top:16px;">
        <button onclick="saveEdit()" style="
          flex:1; padding:9px; background:var(--accent); color:#fff;
          border:none; border-radius:var(--radius-xs); cursor:pointer;
          font-weight:600; font-size:13px; transition:all var(--transition);
        ">Save</button>
        <button onclick="closeEdit()" style="
          flex:1; padding:9px; background:var(--accent-light); color:var(--accent);
          border:none; border-radius:var(--radius-xs); cursor:pointer;
          font-weight:600; font-size:13px; transition:all var(--transition);
        ">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/ratings.js"></script>

</body>

</html>
