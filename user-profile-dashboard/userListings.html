<!DOCTYPE html>

<html lang="en">


<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | My Listings</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/side-bottom-nav.css">
  <link rel="stylesheet" href="../css/toast.css">
  <link rel="stylesheet" href="../css/listings.css">
</head>

<body>

  
  <div id="top-nav"></div>

  <div class="page-wrapper">
    
    <div id="side-nav"></div>

    <main class="main-content">
      <h1 class="page-title">My Listings</h1>

      
      <div class="add-listing-card">
        <p class="section-title">Add New Listing</p>

        <div class="listing-form-two-col">

          <div class="form-col">
            <div class="form-group">
              <label class="form-label">Item Name</label>
              <input type="text" class="form-input" id="inp-name" placeholder="e.g. Casio FX-991EX">
            </div>
            <div class="form-group" style="flex:1;">
              <label class="form-label">
                Description
                <span class="char-counter" id="desc-counter">0 / 500</span>
              </label>
              <textarea class="form-textarea" id="inp-desc" maxlength="500"
                placeholder="Describe your item — condition, reason for selling, accessories included…"
                rows="6"></textarea>
            </div>
          </div>

          <div class="form-col">

            <div class="form-row-two">
              <div class="form-group">
                <label class="form-label">Price</label>
                <div class="input-prefix-wrap">
                  <span class="input-prefix">₱</span>
                  <input type="number" class="form-input with-prefix" id="inp-price" placeholder="0.00" min="0"
                    step="0.01">
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Quantity</label>
                <input type="number" class="form-input" id="inp-qty" value="1" min="1">
              </div>
            </div>

            <div class="form-row-two">
              <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-select" id="inp-category">
                  <option value="">Select…</option>
                  <option>Electronics</option>
                  <option>Books</option>
                  <option>Lab Tools</option>
                  <option>Clothing</option>
                  <option>Others</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Condition</label>
                <select class="form-select" id="inp-condition">
                  <option value="">Select…</option>
                  <option>New</option>
                  <option>Good</option>
                  <option>Used</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Pickup Location</label>
              <input type="text" class="form-input" id="inp-location" placeholder="e.g. Henry Sy Hall Lobby, Gate 1">
            </div>

            <div class="form-group">
              <label class="form-label">Images <span
                  style="text-transform:none;letter-spacing:0;font-weight:500;opacity:.75;">(max 5)</span></label>
              <div class="img-upload-area" id="img-upload-area"
                onclick="document.getElementById('img-file-input').click()">
                <div class="img-upload-inner">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <circle cx="8.5" cy="8.5" r="1.5" />
                    <polyline points="21 15 16 10 5 21" />
                  </svg>
                  <span>Click to upload photos</span>
                </div>
              </div>
              <input type="file" id="img-file-input" accept="image/*" multiple style="display:none">
              <div class="img-thumbs" id="img-thumbs"></div>
            </div>

          </div>
        </div>

        <div class="listing-form-footer">
          <button class="btn-add-listing" onclick="handleAddListing()">Add Listing</button>
        </div>
      </div>

      
      <div class="listings-content-row">

        <div class="listings-main-col">
          <p class="section-title">My Listings</p>
          <div class="item-list" id="listings-list">
            <p style="color:var(--text-muted);padding:16px 0;font-size:13px;">Loading…</p>
          </div>
        </div>

        <div class="listings-side-col">

          <div class="preview-section">
            <p class="section-title">Live Preview</p>
            <div class="preview-card" id="preview-card">
              <div class="preview-img-zone" id="preview-img">
                <div class="preview-img-placeholder">
                  <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="16.5" y1="9.4" x2="7.5" y2="4.21" />
                    <path
                      d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                    <line x1="12" y1="22.08" x2="12" y2="12" />
                  </svg>
                </div>
              </div>
              <div class="preview-body">
                <div class="preview-name" id="preview-name">Item Name</div>
                <div class="preview-price" id="preview-price">₱ –</div>
                <div class="preview-tags">
                  <span class="preview-tag" id="preview-category">Category</span>
                  <span class="preview-tag cond" id="preview-condition"></span>
                </div>
                <span class="preview-status-badge">Pending Review</span>
              </div>
            </div>
          </div>

          <div class="side-panel-card">
            <h3>Listing Status</h3>
            <div style="display:flex;justify-content:center;align-items:center;height:160px;">
              <div style="position:relative;width:160px;height:160px;">
                <canvas id="chart-reports"></canvas>
              </div>
            </div>
          </div>

        </div>
      </div>

    </main>
  </div>

  
  <div id="edit-listing-modal" class="edit-listing-overlay" style="
    display:none; position:fixed; inset:0; z-index:500;
    background:rgba(0,0,0,0.45); backdrop-filter:blur(3px);
    align-items:center; justify-content:center; padding:16px;
  ">
    <div class="edit-listing-card" style="
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:var(--radius); padding:28px 24px 22px;
      width:min(420px, calc(100vw - 32px));
      box-shadow:0 8px 40px rgba(0,0,0,0.18);
      transition:background-color var(--transition);
      max-height:calc(100vh - 40px); overflow-y:auto;
    ">
      <h2 style="font-size:16px;font-weight:800;margin-bottom:20px;color:var(--text);">Edit Listing</h2>

      <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Item Name</p>
      <input id="edit-inp-name" type="text" style="
        width:100%;padding:9px 11px;border:1px solid var(--border);
        border-radius:var(--radius-xs);background:var(--bg);color:var(--text);
        font-size:13px;outline:none;font-family:inherit;
        transition:all var(--transition);box-sizing:border-box;margin-bottom:14px;
      " placeholder="Item name">

      <div class="edit-listing-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Price (₱)</p>
          <input id="edit-inp-price" type="number" min="0" style="
            width:100%;padding:9px 11px;border:1px solid var(--border);
            border-radius:var(--radius-xs);background:var(--bg);color:var(--text);
            font-size:13px;outline:none;font-family:inherit;
            transition:all var(--transition);box-sizing:border-box;
          " placeholder="0">
        </div>
        <div>
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Quantity</p>
          <input id="edit-inp-qty" type="number" min="1" style="
            width:100%;padding:9px 11px;border:1px solid var(--border);
            border-radius:var(--radius-xs);background:var(--bg);color:var(--text);
            font-size:13px;outline:none;font-family:inherit;
            transition:all var(--transition);box-sizing:border-box;
          " placeholder="1">
        </div>
      </div>

      <div class="edit-listing-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div>
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Category</p>
          <select id="edit-inp-category" style="
            width:100%;padding:9px 11px;border:1px solid var(--border);
            border-radius:var(--radius-xs);background:var(--bg);color:var(--text);
            font-size:13px;outline:none;font-family:inherit;
            transition:all var(--transition);box-sizing:border-box;
          ">
            <option value="">Select…</option>
            <option>Electronics</option>
            <option>Books</option>
            <option>Lab Tools</option>
            <option>Clothing</option>
            <option>Others</option>
          </select>
        </div>
        <div>
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Condition</p>
          <select id="edit-inp-condition" style="
            width:100%;padding:9px 11px;border:1px solid var(--border);
            border-radius:var(--radius-xs);background:var(--bg);color:var(--text);
            font-size:13px;outline:none;font-family:inherit;
            transition:all var(--transition);box-sizing:border-box;
          ">
            <option value="">Select…</option>
            <option>New</option>
            <option>Good</option>
            <option>Used</option>
          </select>
        </div>
      </div>

      <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Pickup Location</p>
      <input id="edit-inp-location" type="text" style="
        width:100%;padding:9px 11px;border:1px solid var(--border);
        border-radius:var(--radius-xs);background:var(--bg);color:var(--text);
        font-size:13px;outline:none;font-family:inherit;
        transition:all var(--transition);box-sizing:border-box;margin-bottom:14px;
      " placeholder="e.g. Henry Sy Hall Lobby, Gate 1">

      <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px;">Description</p>
      <textarea id="edit-inp-desc" rows="3" style="
        width:100%;padding:9px 11px;border:1px solid var(--border);
        border-radius:var(--radius-xs);background:var(--bg);color:var(--text);
        font-size:13px;resize:none;outline:none;font-family:inherit;
        transition:all var(--transition);box-sizing:border-box;margin-bottom:20px;
      " maxlength="500" placeholder="Describe your item…"></textarea>

      <div style="display:flex;gap:10px;">
        <button onclick="saveEditListing()" style="
          flex:1;padding:10px;background:var(--accent);color:#fff;
          border:none;border-radius:var(--radius-sm);cursor:pointer;
          font-weight:700;font-size:14px;transition:all var(--transition);
        ">Save</button>
        <button onclick="closeEditListing()" style="
          flex:1;padding:10px;background:var(--accent-light);color:var(--accent);
          border:none;border-radius:var(--radius-sm);cursor:pointer;
          font-weight:600;font-size:14px;transition:all var(--transition);
        ">Cancel</button>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>

  <script>
    const CAT_ICONS = {
      Electronics: ICONS.laptop, Books: ICONS.book,
      'Lab Tools': ICONS.flask, Clothing: ICONS.shirt, Others: ICONS.package,
    };

    let allListings = [];
    let reportsChart = null;
    let uploadedImages = [];

    const STATUS_LABEL = {
      active: 'Active',
      pending_review: 'Pending Review',
      claimed: 'Claimed',
    };

    function renderListings() {
      const el = document.getElementById('listings-list');
      if (!allListings.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-icon-svg">${ICONS.tag}</div><p>No listings yet. Add one above!</p></div>`;
        return;
      }
      el.innerHTML = allListings.map(item => `
        <div class="listing-row" id="listing-${item.id}">
          <div class="listing-thumb">${CAT_ICONS[item.category] || ICONS.package}</div>
          <div class="item-info">
            <p class="item-name">${item.name}</p>
            <p class="item-meta">₱${Number(item.price).toLocaleString()} · ${item.category}${item.condition ? ' · ' + item.condition : ''}</p>
          </div>
          <span class="badge-status ${item.status}">${STATUS_LABEL[item.status] || item.status}</span>
          <div style="display:flex;gap:3px;flex-shrink:0;">
            <button class="btn-icon" title="Edit" onclick="editListing(${item.id})">${ICONS.edit}</button>
            <button class="btn-icon danger" title="Delete" onclick="deleteListing(${item.id})">${ICONS.trash}</button>
          </div>
        </div>
      `).join('');
    }

    function buildReportsChart(items) {
      const t = getChartTheme();
      const counts = { active: 0, pending_review: 0, claimed: 0 };
      items.forEach(i => { if (counts[i.status] !== undefined) counts[i.status]++; });

      const labels = ['Active', 'Pending', 'Claimed'];
      const values = [counts.active, counts.pending_review, counts.claimed];
      const colors = ['rgba(18,124,112,0.85)', 'rgba(201,138,46,0.85)', 'rgba(122,144,141,0.85)'];

      if (reportsChart) reportsChart.destroy();

      reportsChart = new Chart(document.getElementById('chart-reports'), {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors,
            borderColor: t.cardBg,
            borderWidth: 3,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '58%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: t.text, font: { size: 11 }, padding: 12 }
            }
          }
        }
      });
    }

    function updatePreview() {
      const name = document.getElementById('inp-name').value.trim();
      const price = document.getElementById('inp-price').value;
      const cat = document.getElementById('inp-category').value;
      const cond = document.getElementById('inp-condition').value;

      document.getElementById('preview-name').textContent = name || 'Item Name';
      document.getElementById('preview-price').textContent =
        price ? '₱' + parseFloat(price).toLocaleString() : '₱ –';
      document.getElementById('preview-category').textContent = cat || 'Category';
      document.getElementById('preview-condition').textContent = cond;

      const imgZone = document.getElementById('preview-img');
      if (uploadedImages.length > 0) {
        imgZone.innerHTML = `<img src="${uploadedImages[0]}" alt="Preview">`;
      } else {
        imgZone.innerHTML = `<div class="preview-img-placeholder">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        </div>`;
      }
    }

    function renderThumbs() {
      const el = document.getElementById('img-thumbs');
      el.innerHTML = uploadedImages.map((src, i) => `
        <div class="img-thumb-item">
          <img src="${src}" alt="img ${i + 1}">
          <button class="img-thumb-remove" title="Remove" onclick="removeImage(${i})">×</button>
        </div>
      `).join('');
    }

    function removeImage(i) {
      uploadedImages.splice(i, 1);
      renderThumbs();
      updatePreview();
    }

    let editingListingId = null;

    function editListing(id) {
      const item = allListings.find(l => l.id === id);
      if (!item) return;
      editingListingId = id;
      document.getElementById('edit-inp-name').value = item.name || '';
      document.getElementById('edit-inp-price').value = item.price || '';
      document.getElementById('edit-inp-qty').value = item.quantity || 1;
      document.getElementById('edit-inp-category').value = item.category || '';
      document.getElementById('edit-inp-condition').value = item.condition || '';
      document.getElementById('edit-inp-location').value = item.location || '';
      document.getElementById('edit-inp-desc').value = item.description || '';
      document.getElementById('edit-listing-modal').style.display = 'flex';
    }

    function closeEditListing() {
      document.getElementById('edit-listing-modal').style.display = 'none';
      editingListingId = null;
    }

    function saveEditListing() {
      const item = allListings.find(l => l.id === editingListingId);
      if (!item) return;
      const name = document.getElementById('edit-inp-name').value.trim();
      const price = document.getElementById('edit-inp-price').value.trim();
      if (!name || !price) {
        showToast('Missing Fields', 'Name and Price are required.', 'warning');
        return;
      }
      item.name = name;
      item.price = parseFloat(price);
      item.quantity = parseInt(document.getElementById('edit-inp-qty').value) || 1;
      item.category = document.getElementById('edit-inp-category').value;
      item.condition = document.getElementById('edit-inp-condition').value;
      item.location = document.getElementById('edit-inp-location').value.trim();
      item.description = document.getElementById('edit-inp-desc').value.trim();
      renderListings();
      buildReportsChart(allListings);
      closeEditListing();
      showToast('Updated', 'Listing has been updated.', 'success');
    }

    document.getElementById('edit-listing-modal').addEventListener('click', function (e) {
      if (e.target === this) closeEditListing();
    });

    function deleteListing(id) {
      showConfirm(
        'Delete this Listing?',
        'This will permanently remove the listing. This action cannot be undone.',
        () => {
          allListings = allListings.filter(l => l.id !== id);
          renderListings();
          buildReportsChart(allListings);
          showToast('Deleted', 'Listing removed.', 'success');
        }
      );
    }

    function handleAddListing() {
      const name = document.getElementById('inp-name').value.trim();
      const price = document.getElementById('inp-price').value.trim();
      const cat = document.getElementById('inp-category').value;
      const condition = document.getElementById('inp-condition').value;
      const desc = document.getElementById('inp-desc').value.trim();
      const qty = parseInt(document.getElementById('inp-qty').value) || 1;
      const location = document.getElementById('inp-location').value.trim();

      if (!name || !price || !cat) {
        showToast('Missing Fields', 'Please fill in Name, Price, and Category.', 'warning');
        return;
      }

      const newItem = {
        id: Date.now(),
        name,
        price: parseFloat(price),
        category: cat,
        condition,
        description: desc,
        quantity: qty,
        location,
        status: 'pending_review',
      };
      allListings.unshift(newItem);
      renderListings();
      buildReportsChart(allListings);

      ['inp-name', 'inp-price', 'inp-desc', 'inp-location'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('inp-category').value = '';
      document.getElementById('inp-condition').value = '';
      document.getElementById('inp-qty').value = '1';
      document.getElementById('desc-counter').textContent = '0 / 500';
      uploadedImages = [];
      renderThumbs();
      updatePreview();

      showToast('Listing Added', 'Your listing is pending admin review.', 'success');
    }

    document.addEventListener('themeChanged', () => {
      if (!reportsChart) return;
      const t = getChartTheme();
      reportsChart.data.datasets[0].borderColor = t.cardBg;
      reportsChart.options.plugins.legend.labels.color = t.text;
      reportsChart.update('none');
    });

    document.addEventListener('DOMContentLoaded', function () {
      const descEl = document.getElementById('inp-desc');
      const counterEl = document.getElementById('desc-counter');
      descEl.addEventListener('input', function () {
        const n = this.value.length;
        counterEl.textContent = n + ' / 500';
        counterEl.className = 'char-counter' + (n >= 500 ? ' at-limit' : n >= 450 ? ' near-limit' : '');
      });

      ['inp-name', 'inp-price', 'inp-category', 'inp-condition'].forEach(id => {
        document.getElementById(id).addEventListener('input', updatePreview);
        document.getElementById(id).addEventListener('change', updatePreview);
      });

      document.getElementById('img-file-input').addEventListener('change', function (e) {
        const remaining = 5 - uploadedImages.length;
        Array.from(e.target.files).slice(0, remaining).forEach(file => {
          const reader = new FileReader();
          reader.onload = ev => {
            uploadedImages.push(ev.target.result);
            renderThumbs();
            updatePreview();
          };
          reader.readAsDataURL(file);
        });
        this.value = '';
      });

      fetch('../data/mock-listings.json')
        .then(r => r.json())
        .then(items => {
          allListings = items;
          renderListings();
          buildReportsChart(items);
        })
        .catch(() => {
          document.getElementById('listings-list').innerHTML =
            '<p style="color:var(--text-muted);font-size:13px;">Could not load listings.</p>';
          showToast('Error', 'Failed to load listings.', 'error');
        });
    });
  </script>
</body>

</html>
