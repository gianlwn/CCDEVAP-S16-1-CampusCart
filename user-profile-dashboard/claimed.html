<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | Claimed</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/side-bottom-nav.css">

</head>

<body>

  <div id="top-nav"></div>

  <div class="page-wrapper">

    <div id="side-nav"></div>

    <main class="main-content">

      <div class="content-grid">

        <div>
          <p class="section-title">Your Claimed Items</p>
          <div class="item-list" id="claimed-list">
            <p style="color:var(--text-muted);padding:16px 0;">Loadingâ€¦</p>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:16px;">

          <div class="side-panel-card">
            <h3>Items by Category</h3>
            <div class="chart-container-sm">
              <canvas id="chart-cat"></canvas>
            </div>
          </div>

          <div class="side-panel-card" id="summary-card" style="display:none;">
            <h3>Summary</h3>
            <div id="summary-content"></div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>

</html>
