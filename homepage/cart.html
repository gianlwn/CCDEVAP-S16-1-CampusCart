<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | Cart</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/toast.css">
  <link rel="stylesheet" href="../css/cart.css">
</head>

<body>

  <div id="top-nav"></div>
  <div class="page-top-only">
    <h1 class="page-title">Cart</h1>

    <div class="cart-layout" id="cart-layout">

      <div>
        <div class="cart-list" id="cart-list">
          <p class="loading-text">Loading…</p>
        </div>
      </div>

      <div class="cart-summary-card hidden" id="cart-summary">
        <p class="summary-heading">Order Summary</p>
        <p class="summary-count" id="summary-count">0 items</p>
        <div class="summary-items" id="summary-items"></div>
        <div class="summary-divider"></div>
        <div class="summary-total-row">
          <span>Total</span>
          <span class="cart-total-val" id="cart-total">₱0</span>
        </div>
        <button class="btn-claim" onclick="handleClaim()">Claim All</button>
        <p class="summary-note">Items will be reserved for 24 hours. Coordinate with each seller to arrange pickup.</p>
      </div>

    </div>

  </div>

  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/cart.js"></script>

</body>

</html>
