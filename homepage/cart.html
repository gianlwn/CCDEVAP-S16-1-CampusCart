<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart – Cart</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/cart.css">
  <link rel="stylesheet" href="../css/top-nav.css">
</head>
<body>

  <div id="top-nav"></div>
  <div class="page-top-only">
    <h1 class="page-title">Cart</h1>

    <div class="cart-list" id="cart-list">
      <p class="loading-text">Loading…</p>
    </div>

    <div class="cart-footer hidden" id="cart-footer">
      <div>
        <p class="cart-total-label">Total</p>
        <p class="cart-total-val" id="cart-total">₱0</p>
      </div>
      <button class="btn-claim" onclick="handleClaim()">
        Claim All
      </button>
    </div>
  </div>

  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/cart.js"></script>

</body>
</html>
