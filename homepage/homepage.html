<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart | HomePage</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/toast.css">
  <link rel="stylesheet" href="../css/homepage.css">
</head>

<body>

  <div id="top-nav"></div>

  <div class="page-top-only">

    <div class="hp-hero-banner">
      <div class="hp-hero-text">
        <h2>Student essentials, student prices</h2>
        <p>Buy &amp; sell secondhand gear on campus</p>
      </div>
      <button class="hp-sell-btn" onclick="window.location.href='../user-profile-dashboard/userListings.html'">Sell an
        item</button>
    </div>

    <div class="hp-search-bar">
      <span class="hp-search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg></span>
      <input type="text" id="search-input" placeholder="Search keyword, shop names…">
      <button onclick="handleSearch()">Search</button>
    </div>

    <div class="hp-filters">
      <div class="hp-filter-pills">
        <button class="hp-filter-btn active" onclick="filterBy('all', this)">Trending</button>
        <button class="hp-filter-btn" onclick="filterBy('all', this)">For You</button>
        <button class="hp-filter-btn" onclick="filterBy('Electronics', this)">Electronics</button>
        <button class="hp-filter-btn" onclick="filterBy('Books', this)">Books</button>
        <button class="hp-filter-btn" onclick="filterBy('Lab Tools', this)">Lab Tools</button>
        <button class="hp-filter-btn" onclick="filterBy('Clothing', this)">Clothing</button>
      </div>
      <div class="hp-filter-sep"></div>
      <button class="hp-filters-btn" onclick="openFiltersPanel()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6" />
          <line x1="8" y1="12" x2="16" y2="12" />
          <line x1="11" y1="18" x2="13" y2="18" />
        </svg>
        Filters
      </button>
    </div>

    <div class="hp-grid" id="item-grid"></div>

  </div>

  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/homepage.js"></script>
</body>

</html>
