<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusCart – HomePage</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/top-nav.css">
  <link rel="stylesheet" href="../css/homepage.css">
</head>
<body>

  <div id="top-nav-container"></div>

  <div class="page-top-only">

    <p class="hp-hero">Offering You Student Essentials at Student Prices!</p>

    <div class="hp-search-bar">
      <input type="text" id="search-input" placeholder="Search keyword, shop names…">
      <button onclick="handleSearch()">🔍</button>
    </div>

    <div class="hp-filters">
      <button class="hp-filter-btn active" onclick="filterBy('all', this)">Trending</button>
      <button class="hp-filter-btn"        onclick="filterBy('all', this)">For You</button>
      <button class="hp-filter-btn"        onclick="filterBy('Electronics', this)">Electronics</button>
      <button class="hp-filter-btn"        onclick="filterBy('Books', this)">Books</button>
      <button class="hp-filter-btn"        onclick="filterBy('Lab Tools', this)">Lab Tools</button>
      <button class="hp-filter-btn"        onclick="filterBy('Clothing', this)">Clothing</button>
    </div>

    <div class="hp-grid" id="item-grid"></div>

  </div>

  <script src="../js/components.js"></script>
  <script src="../js/toggleTheme.js"></script>
  <script src="../js/toastNotification.js"></script>
  <script src="../js/main.js"></script>

  <script>
    const EMOJI = { Electronics: '💻', Books: '📚', 'Lab Tools': '🧪', Clothing: '👕', Others: '📦' };
    let allItems  = [];
    let activeFilter = 'all';

    function renderGrid(items) {
      const grid = document.getElementById('item-grid');
      if (!items.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><p>No items found.</p></div>`;
        return;
      }
      grid.innerHTML = items.map(item => `
        <div class="hp-item-card" onclick="viewItem(${item.id})">
          <div class="hp-item-thumb">${EMOJI[item.category] || '📦'}</div>
          <div class="hp-item-info">
            <p class="hp-item-name">${item.name}</p>
            <p class="hp-item-price">₱${item.price}</p>
          </div>
        </div>
      `).join('');
    }

    function filterBy(cat, btn) {
      document.querySelectorAll('.hp-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = cat;
      applyFilters();
    }

    function handleSearch() {
      applyFilters();
    }

    function applyFilters() {
      const q = document.getElementById('search-input').value.toLowerCase().trim();
      let results = allItems;
      if (activeFilter !== 'all') results = results.filter(i => i.category === activeFilter);
      if (q) results = results.filter(i => i.name.toLowerCase().includes(q) || i.description.toLowerCase().includes(q));
      renderGrid(results);
    }

    function viewItem(id) {
      showToast('Item Details', 'Item detail page coming soon!', 'info');
    }

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSearch();
    });

    document.addEventListener('DOMContentLoaded', function () {
      fetch('../data/mock-listings.json')
        .then(r => r.json())
        .then(items => {
          allItems = items.filter(i => i.status === 'active');
          const extras = [
            { id: 10, name: 'Graph Paper Notebook', price: 60,  category: 'Books',       status: 'active', description: 'Engineering graph pad', image: null },
            { id: 11, name: 'Soldering Iron Set',   price: 280, category: 'Electronics', status: 'active', description: 'Adjustable temperature', image: null },
            { id: 12, name: 'Safety Goggles',       price: 75,  category: 'Lab Tools',   status: 'active', description: 'Clear polycarbonate lens', image: null },
            { id: 13, name: 'Denim Jacket (M)',      price: 250, category: 'Clothing',    status: 'active', description: 'Barely worn, good condition', image: null },
            { id: 14, name: 'Thermodynamics Book',   price: 400, category: 'Books',       status: 'active', description: 'Cengel & Boles 9th ed', image: null },
            { id: 15, name: 'Breadboard + Wires',    price: 120, category: 'Electronics', status: 'active', description: '830 tie-point breadboard', image: null },
          ];
          allItems = [...allItems, ...extras];
          renderGrid(allItems);
        })
        .catch(() => showToast('Error', 'Could not load listings.', 'error'));
    });
  </script>
</body>
</html>
